# Test workflow：为 pull_request 与 push main 运行 lint / frontend / backend 三个 job。
# - lint    ：golangci-lint 独立跑，不依赖前端产物
# - frontend：npm run build，产物上传为 artifact（供 backend 下载）
# - backend ：needs frontend，下载 artifact 后 go vet + go test -race
# 排除文档、忽略文件类改动，避免无谓触发。
name: Test

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - '.dockerignore'
      - '.gitignore'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Ensure embed dir exists
        run: |
          mkdir -p internal/webui/dist
          touch internal/webui/dist/.gitkeep

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Type check + build
        working-directory: web
        run: npm run build

      - name: Copy dist to embed dir
        run: |
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          cp -r web/dist/. internal/webui/dist/

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/webui/dist
          retention-days: 1
          if-no-files-found: error

  backend:
    name: Go tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/webui/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -race -count=1 ./...
