services:
  routerhub:
    build:
      context: .
      args:
        BUILD_DATE: ${BUILD_DATE:-}
    image: routerhub:latest
    container_name: routerhub
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      TZ: Asia/Shanghai
      ROUTERHUB_HOST: 0.0.0.0
      ROUTERHUB_PORT: "8080"
